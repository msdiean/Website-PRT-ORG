apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment  # Changed name to apache-deployment
  labels:
    app: apache2  # Updated app label
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache2  # Updated selector to match Apache pods
  template:
    metadata:
      labels:
        app: apache2  # Updated pod label
    spec:
      containers:
      - name: apache
        image: msdiean/project2:latest  # Ensure this image contains Apache2
        ports:
        - containerPort: 80
